<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>サロン予約</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>サロン予約システム</h1>
    <p>接続確認：<span id="status">接続中...</span></p>

    <script>
        // 設定されたSupabaseの情報を適用しました
        const SUPABASE_URL = 'https://cbknucemarcpbscirzyv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 接続テスト
        async function testConnection() {
            try {
                const { data, error } = await supabase.from('bookings').select('*').limit(1);
                if (error) {
                    document.getElementById('status').innerText = 'エラー: ' + error.message;
                } else {
                    document.getElementById('status').innerText = 'データベースに接続成功！';
                }
            } catch (err) {
                document.getElementById('status').innerText = '接続失敗: ' + err.message;
            }
        }
        testConnection();
    </script>
</body>
</html>
