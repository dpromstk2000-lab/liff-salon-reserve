<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Booking System</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #fcfbf9; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-box { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { padding: 10px; border: none; border-radius: 8px; cursor: pointer; background: #8e7f7f; color: white; width: 100%; margin-bottom: 5px; }
        .selected-slot { background: #d9a0a0 !important; }
        li { list-style: none; border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="user-display">読み込み中...</h2>
    <input type="hidden" id="edit_id">
    
    <label>お客様名</label>
    <input type="text" id="customer_name" class="input-box" placeholder="山田 太郎">
    <label>備考（任意）</label>
    <input type="text" id="customer_memo" class="input-box" placeholder="ご要望など">
    <label>予約希望日</label>
    <input type="date" id="select_date" class="input-box" onchange="renderTimeSlots()">
    
    <div id="time-slots"></div>
    <input type="hidden" id="selected_datetime">
    
    <button id="save_btn" onclick="saveBooking()">予約を確定</button>
    <button onclick="clearForm()" style="background:#aaa;">クリア</button>
    
    <h3 style="margin-top:30px;">あなたの予約一覧</h3>
    <ul id="booking-list" style="padding:0;"></ul>
</div>

<script>
    const sbClient = supabase.createClient('https://cbknucemarcpbscirzyv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNia251Y2VtYXJjcGJzY2lyenl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxOTg5MDEsImV4cCI6MjA5NTc3NDkwMX0.Hu2KjL-fin4n-u2ENkmu9XNcs04uI304cZpycX9FHFE');
    let lineUserId = "";

    async function initLiff() {
        await liff.init({ liffId: "2010243135-H06VsAHm" });
        // カレンダーの最小値を今日に設定
        document.getElementById('select_date').min = new Date().toISOString().split('T')[0];
        
        if (liff.isLoggedIn()) {
            const p = await liff.getProfile();
            lineUserId = p.userId;
            document.getElementById('user-display').innerText = p.displayName + " 様";
            fetchBookings();
        } else { liff.login(); }
    }

    async function fetchBookings() {
        const { data } = await sbClient.from('bookings').select('*').eq('line_user_id', lineUserId).order('start_datetime');
        const list = document.getElementById('booking-list');
        list.innerHTML = '';
        data?.forEach(item => {
            const li = document.createElement('li');
            li.innerHTML = `<div><strong>${item.customer_name}</strong><br>${item.start_datetime.replace('T', ' ').substring(0,16)}<br><small>備考: ${item.memo || ''}</small></div>
                            <div>
                                <button onclick="editBooking(${item.id}, '${item.customer_name}', '${item.start_datetime}', '${item.memo || ''}')" style="background:#888; width:auto;">編集</button>
                                <button onclick="deleteBooking(${item.id})" style="background:#d9a0a0; width:auto;">削除</button>
                            </div>`;
            list.append(li);
        });
    }

    async function saveBooking() {
        const id = document.getElementById('edit_id').value;
        const name = document.getElementById('customer_name').value.trim();
        const time = document.getElementById('selected_datetime').value;
        const memo = document.getElementById('customer_memo').value;
        if (!name || !time) return alert('名前と時間を選択してください');

        if (id) {
            await sbClient.from('bookings').update({ customer_name: name, start_datetime: time, memo: memo }).eq('id', id);
        } else {
            await sbClient.from('bookings').insert({ customer_name: name, start_datetime: time, line_user_id: lineUserId, memo: memo });
        }
        alert('保存しました');
        clearForm(); fetchBookings();
    }

    function editBooking(id, name, datetime, memo) {
        document.getElementById('edit_id').value = id;
        document.getElementById('customer_name').value = name;
        document.getElementById('customer_memo').value = memo;
        document.getElementById('select_date').value = datetime.substring(0, 10);
        document.getElementById('selected_datetime').value = datetime;
        document.getElementById('save_btn').innerText = '変更を保存';
        renderTimeSlots();
    }

    async function deleteBooking(id) {
        if(!confirm('削除しますか？')) return;
        await sbClient.from('bookings').delete().eq('id', id);
        fetchBookings();
    }

    function clearForm() {
        document.getElementById('edit_id').value = '';
        document.getElementById('customer_name').value = '';
        document.getElementById('customer_memo').value = '';
        document.getElementById('save_btn').innerText = '予約を確定';
        document.getElementById('select_date').value = '';
        renderTimeSlots();
    }

    async function renderTimeSlots() {
        const dateStr = document.getElementById('select_date').value;
        const container = document.getElementById('time-slots');
        container.innerHTML = '';
        if (!dateStr) return;

        const { data: holidays } = await sbClient.from('salon_settings').select('holiday_date');
        const isClosed = new Date(dateStr).getDay() === 1 || holidays.some(h => h.holiday_date === dateStr);
        if (isClosed) return container.innerHTML = '<p style="color:red;">休業日です。</p>';
        
        const { data } = await sbClient.from('bookings').select('start_datetime').gte('start_datetime', `${dateStr}T00:00:00`).lte('start_datetime', `${dateStr}T23:59:59`);
        const booked = data.map(b => b.start_datetime.substring(11, 16));
        
        for (let h = 10; h < 19; h++) {
            [0, 30].forEach(m => {
                const t = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                const btn = document.createElement('button');
                btn.innerText = booked.includes(t) ? '✕' : t;
                btn.disabled = booked.includes(t);
                if (booked.includes(t)) btn.style.background = '#eee';
                btn.onclick = () => {
                    document.querySelectorAll('#time-slots button').forEach(b => b.classList.remove('selected-slot'));
                    btn.classList.add('selected-slot');
                    document.getElementById('selected_datetime').value = `${dateStr}T${t}:00`;
                };
                container.appendChild(btn);
            });
        }
    }
    initLiff();
</script>
</body>
</html>
