<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約管理システム</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1>予約一覧</h1>
    <ul id="booking-list">読み込み中...</ul>

    <script>
        // 設定を正しい情報で埋め込みました
        const SUPABASE_URL = 'https://cbknucemarcpbscirzyv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNia251Y2VtYXJjcGJzY2lyenl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxOTg5MDEsImV4cCI6MjA5NTc3NDkwMX0.Hu2KjL-fin4n-u2ENkmu9XNcs04uI304cZpycX9FHFE';
        
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 予約データの取得と表示（日付の近い順にソート）
        async function fetchBookings() {
            const { data, error } = await sbClient
                .from('bookings')
                .select('*')
                .order('start_datetime', { ascending: true });
            
            const list = document.getElementById('booking-list');
            list.innerHTML = '';
            
            if (error) {
                list.innerHTML = 'エラー: ' + error.message;
                return;
            }

            if (data && data.length > 0) {
                data.forEach(item => {
                    const li = document.createElement('li');
                    const dateStr = new Date(item.start_datetime).toLocaleString();
                    li.innerHTML = `<strong>${item.customer_name}</strong> - ${dateStr} 
                                    <button onclick="deleteBooking(${item.id})">削除</button>`;
                    list.append(li);
                });
            } else {
                list.innerHTML = '現在、予約はありません。';
            }
        }

        // 予約データの削除
        async function deleteBooking(id) {
            if (!confirm('本当に削除しますか？')) return;
            
            const { error } = await sbClient
                .from('bookings')
                .delete()
                .eq('id', id);
            
            if (error) {
                alert('削除失敗: ' + error.message);
            } else {
                alert('削除しました');
                fetchBookings(); // リストを再読み込み
            }
        }

        // ページ読み込み時に実行
        fetchBookings();
    </script>
</body>
</html>
