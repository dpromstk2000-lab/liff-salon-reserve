<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Booking System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #fcfbf9; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-box { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; background: #8e7f7f; color: white; margin-bottom: 5px; }
        li { list-style: none; border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>予約管理</h2>
    <input type="hidden" id="edit_id">
    <input type="text" id="customer_name" class="input-box" placeholder="お客様名">
    <input type="datetime-local" id="start_datetime" class="input-box">
    <button id="save_btn" onclick="saveBooking()">予約を登録</button>
    <button onclick="clearForm()">クリア</button>
    <ul id="booking-list" style="padding:0;"></ul>
</div>

<script>
    const sbClient = supabase.createClient('https://cbknucemarcpbscirzyv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNia251Y2VtYXJjcGJzY2lyenl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxOTg5MDEsImV4cCI6MjA5NTc3NDkwMX0.Hu2KjL-fin4n-u2ENkmu9XNcs04uI304cZpycX9FHFE');

    async function fetchBookings() {
        // ★修正: UTC変換のズレを防ぐため、単純な文字列として扱う
        const { data } = await sbClient.from('bookings').select('*').order('start_datetime', { ascending: true });
        const list = document.getElementById('booking-list');
        list.innerHTML = '';
        if (data) {
            data.forEach(item => {
                // 文字列のまま日時を表示（Tを空白に置換）
                const displayTime = item.start_datetime.replace('T', ' ').substring(0, 16);
                const li = document.createElement('li');
                li.innerHTML = `<div><strong>${item.customer_name}</strong><br>${displayTime}</div>
                                <div>
                                    <button onclick="editBooking(${item.id}, '${item.customer_name}', '${item.start_datetime}')">編集</button>
                                    <button onclick="deleteBooking(${item.id})" style="background:#d9a0a0;">削除</button>
                                </div>`;
                list.append(li);
            });
        }
    }

    function editBooking(id, name, datetime) {
        document.getElementById('edit_id').value = id;
        document.getElementById('customer_name').value = name;
        // 秒の部分まで含んでいる場合を考慮して切り詰め
        document.getElementById('start_datetime').value = datetime.substring(0, 16);
        document.getElementById('save_btn').innerText = '変更を保存';
    }

    async function saveBooking() {
        const id = document.getElementById('edit_id').value;
        const name = document.getElementById('customer_name').value;
        const time = document.getElementById('start_datetime').value;
        
        if (!name || !time) return alert('入力してください');

        // ★IDが空文字('')ならINSERT、値があればUPDATE
        if (id !== '') {
            const { error } = await sbClient.from('bookings').update({ customer_name: name, start_datetime: time }).eq('id', parseInt(id));
            if (error) alert('更新エラー: ' + error.message);
        } else {
            const { error } = await sbClient.from('bookings').insert({ customer_name: name, start_datetime: time });
            if (error) alert('登録エラー: ' + error.message);
        }
        clearForm();
        await fetchBookings();
    }

    function clearForm() {
        document.getElementById('edit_id').value = '';
        document.getElementById('customer_name').value = '';
        document.getElementById('start_datetime').value = '';
        document.getElementById('save_btn').innerText = '予約を登録';
    }

    fetchBookings();
</script>
</body>
</html>
