<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約ページ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #fcfbf9; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-box { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { padding: 10px; border: none; border-radius: 8px; cursor: pointer; background: #8e7f7f; color: white; width: 100%; margin-bottom: 5px; }
        #time-slots { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .selected-slot { background: #d9a0a0 !important; }
        .booking-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .memo-text { font-size: 0.85em; color: #666; background: #f9f9f9; padding: 5px; border-radius: 4px; display: block; margin-top: 5px; }
        .status-card { border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .next-booking { background: #fffaf8; }
        .past-booking { background: #f8f7f4; }
        .status-label { font-size: 0.8em; color: #8e7f7f; font-weight: bold; margin-bottom: 6px; }
        .status-date { font-size: 1.1em; margin-bottom: 6px; }
        .empty-text { color: #777; font-size: 0.9em; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="user-display">読み込み中...</h2>
    
    <label>お客様名（フルネーム）</label>
    <input type="text" id="customer_name" class="input-box" placeholder="山田 太郎">
    
    <label>担当スタッフを選択</label>
    <select id="select_staff" class="input-box" onchange="renderTimeSlots()">
        <option value="お任せ">お任せ（指定なし）</option>
    </select>

    <label>予約希望日</label>
    <input type="date" id="select_date" class="input-box" onchange="renderTimeSlots()">
    
    <label>備考（任意）</label>
    <input type="text" id="customer_memo" class="input-box" placeholder="ご要望など">
    
    <div id="time-slots"></div>
    <input type="hidden" id="selected_datetime">
    
    <button id="save_btn" onclick="saveBooking()" style="margin-top:20px;">予約を確定</button>
    <button onclick="location.reload()" style="background:#aaa;">クリア</button>
    
    <h3 style="margin-top:30px;">ご予約状況</h3>
    <div id="booking-list"></div>
</div>

<script>
    const sbClient = supabase.createClient('https://cbknucemarcpbscirzyv.supabase.co', 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J');
    let lineUserId = "";

    async function initLiff() {
        await liff.init({ liffId: "2010243135-H06VsAHm" });
        document.getElementById('select_date').min = new Date().toISOString().split('T')[0];
        if (liff.isLoggedIn()) {
            const p = await liff.getProfile();
            lineUserId = p.userId;
            document.getElementById('user-display').innerText = p.displayName + " 様";
            fetchBookings();
            fetchStaffs();
        } else { liff.login(); }
    }

    async function fetchStaffs() {
        const { data } = await sbClient.from('staffs').select('*');
        const select = document.getElementById('select_staff');
        data?.forEach(s => {
            select.innerHTML += `<option value="${s.name}">${s.name}</option>`;
        });
    }

    async function saveBooking() {
        const name = document.getElementById('customer_name').value.trim();
        const time = document.getElementById('selected_datetime').value;
        const staff = document.getElementById('select_staff').value;
        
        if (!name.includes(' ') && !name.includes('　')) return alert('フルネーム（苗字と名前の間にスペース）で入力してください。');
        if (!time) return alert('時間を選択してください');
        
        const { error } = await sbClient.from('bookings').insert({ 
            customer_name: name, memo: document.getElementById('customer_memo').value.trim(), 
            start_datetime: time, staff_name: staff, line_user_id: lineUserId 
        });
        if (error) alert('予約失敗: ' + error.message); else { alert('予約しました'); location.reload(); }
    }

    function toLocalDateTimeString(date) {
        const y = date.getFullYear();
        const mo = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        const h = String(date.getHours()).padStart(2, '0');
        const mi = String(date.getMinutes()).padStart(2, '0');
        const s = String(date.getSeconds()).padStart(2, '0');
        return `${y}-${mo}-${d}T${h}:${mi}:${s}`;
    }

    function formatBookingDate(value) {
        return value.replace('T', ' ').substring(0, 16);
    }

    function createBookingCard(item, type) {
        const now = new Date();
        const bookingDate = new Date(item.start_datetime);
        const canCancel = type === 'next' && (bookingDate - now) / (1000 * 60 * 60 * 24) > 1;

        const div = document.createElement('div');
        div.className = `booking-item status-card ${type === 'next' ? 'next-booking' : 'past-booking'}`;
        div.innerHTML = `
            <div class="status-label">${type === 'next' ? '次回のご予約' : '前回の予約日'}</div>
            <div class="status-date"><strong>${formatBookingDate(item.start_datetime)}</strong></div>
            <div>${item.customer_name} [担当: ${item.staff_name}]</div>
            ${item.memo ? `<span class="memo-text">メモ: ${item.memo}</span>` : ''}
            ${type === 'next'
                ? (canCancel
                    ? `<button onclick="deleteBooking(${item.id})" style="background:#d9a0a0; width:auto; margin-top:10px;">予約を削除</button>`
                    : '<p style="color:red; font-size:0.8em;">※前日以降の変更は電話へ</p>')
                : '<p style="color:#777; font-size:0.8em; margin-bottom:0;">前回のご来店記録です</p>'
            }
        `;
        return div;
    }

    async function fetchBookings() {
        const list = document.getElementById('booking-list');
        list.innerHTML = '読み込み中...';

        const nowStr = toLocalDateTimeString(new Date());

        const [nextResult, lastResult] = await Promise.all([
            sbClient.from('bookings')
                .select('*')
                .eq('line_user_id', lineUserId)
                .gte('start_datetime', nowStr)
                .order('start_datetime', { ascending: true })
                .limit(1),
            sbClient.from('bookings')
                .select('*')
                .eq('line_user_id', lineUserId)
                .lt('start_datetime', nowStr)
                .order('start_datetime', { ascending: false })
                .limit(1)
        ]);

        list.innerHTML = '';

        if (nextResult.error || lastResult.error) {
            list.innerHTML = '<p class="empty-text">予約情報の取得に失敗しました。</p>';
            return;
        }

        const nextBooking = nextResult.data?.[0];
        const lastBooking = lastResult.data?.[0];

        if (!nextBooking && !lastBooking) {
            list.innerHTML = '<p class="empty-text">現在、表示できる予約はありません。</p>';
            return;
        }

        if (nextBooking) list.append(createBookingCard(nextBooking, 'next'));
        if (lastBooking) list.append(createBookingCard(lastBooking, 'past'));
    }

    async function deleteBooking(id) { if(!confirm('削除しますか？')) return; await sbClient.from('bookings').delete().eq('id', id); fetchBookings(); }

    async function renderTimeSlots() {
        const dateStr = document.getElementById('select_date').value;
        const staffName = document.getElementById('select_staff').value;
        const container = document.getElementById('time-slots');
        container.innerHTML = '';
        if (!dateStr) return;

        const { data: setting } = await sbClient.from('salon_settings').select('*').eq('id', 1).single();
        // 定休日ロジック
        const dayOfWeek = new Date(dateStr).getDay();
        if (setting.regular_holidays?.split(',').includes(dayOfWeek.toString())) return container.innerHTML = '<p>定休日です</p>';

        const startH = parseInt(setting.open_time.split(':')[0]);
        const endH = parseInt(setting.close_time.split(':')[0]);

        // クエリ設定（「お任せ」ならスタッフ指定なし）
        let query = sbClient.from('bookings').select('start_datetime').gte('start_datetime', `${dateStr}T00:00:00`).lte('start_datetime', `${dateStr}T23:59:59`);
        if (staffName !== 'お任せ') query = query.eq('staff_name', staffName);

        const { data } = await query;
        const booked = data ? data.map(b => b.start_datetime.substring(11, 16)) : [];
        
        for (let h = startH; h < endH; h++) {
            [0, 30].forEach(m => {
                const t = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                const isBooked = booked.includes(t);
                const btn = document.createElement('button');
                btn.innerText = isBooked ? '✕' : t;
                btn.disabled = isBooked;
                if (isBooked) btn.style.background = '#eee';
                btn.onclick = () => {
                    document.querySelectorAll('#time-slots button').forEach(b => b.classList.remove('selected-slot'));
                    btn.classList.add('selected-slot');
                    document.getElementById('selected_datetime').value = `${dateStr}T${t}:00`;
                };
                container.appendChild(btn);
            });
        }
    }
    initLiff();
</script>
</body>
</html>
