<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Salon Booking System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #fcfbf9; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-box { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #time-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        button { padding: 10px; border: none; border-radius: 8px; cursor: pointer; background: #8e7f7f; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        /* 選択中ボタンのスタイル */
        .selected-slot { background: #d9a0a0 !important; transform: scale(0.95); }
        li { list-style: none; border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>予約管理</h2>
    <input type="hidden" id="edit_id">
    <input type="text" id="customer_name" class="input-box" placeholder="お客様名">
    <input type="date" id="select_date" class="input-box" onchange="renderTimeSlots()">
    <div id="time-slots"></div>
    <input type="hidden" id="selected_datetime">
    
    <button id="save_btn" onclick="saveBooking()" style="width:100%; margin-bottom:10px;">予約を登録</button>
    <button onclick="clearForm()" style="width:100%; background:#aaa;">クリア</button>
    <ul id="booking-list" style="padding:0; margin-top:20px;"></ul>
</div>

<script>
    const sbClient = supabase.createClient('https://cbknucemarcpbscirzyv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNia251Y2VtYXJjcGJzY2lyenl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxOTg5MDEsImV4cCI6MjA5NTc3NDkwMX0.Hu2KjL-fin4n-u2ENkmu9XNcs04uI304cZpycX9FHFE');

    document.getElementById('select_date').min = new Date().toISOString().split('T')[0];

    async function renderTimeSlots() {
        const date = document.getElementById('select_date').value;
        if (!date) return;
        const { data: bookings } = await sbClient.from('bookings').select('start_datetime');
        const bookedTimes = bookings ? bookings.map(b => b.start_datetime.substring(11, 16)) : [];
        const container = document.getElementById('time-slots');
        container.innerHTML = '';
        
        for (let h = 10; h < 19; h++) {
            [0, 30].forEach(m => {
                const timeStr = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                const btn = document.createElement('button');
                btn.innerText = bookedTimes.includes(timeStr) ? '×' : timeStr;
                btn.disabled = bookedTimes.includes(timeStr);
                
                btn.onclick = function() {
                    // 他の選択状態を解除して今のボタンにクラスを追加
                    document.querySelectorAll('#time-slots button').forEach(b => b.classList.remove('selected-slot'));
                    this.classList.add('selected-slot');
                    document.getElementById('selected_datetime').value = `${date}T${timeStr}:00`;
                };
                container.appendChild(btn);
            });
        }
    }

    async function fetchBookings() {
        const { data } = await sbClient.from('bookings').select('*').order('start_datetime');
        const list = document.getElementById('booking-list');
        list.innerHTML = '';
        data?.forEach(item => {
            const li = document.createElement('li');
            li.innerHTML = `<div><strong>${item.customer_name}</strong><br>${item.start_datetime.replace('T', ' ').substring(0, 16)}</div>
                            <div>
                                <button onclick="editBooking(${item.id}, '${item.customer_name}', '${item.start_datetime}')">編集</button>
                                <button onclick="deleteBooking(${item.id})" style="background:#d9a0a0;">削除</button>
                            </div>`;
            list.append(li);
        });
    }

    async function saveBooking() {
        const id = document.getElementById('edit_id').value;
        const name = document.getElementById('customer_name').value;
        const time = document.getElementById('selected_datetime').value;
        if (!name || !time) return alert('名前と時間を選択してください');
        if (id) await sbClient.from('bookings').update({ customer_name: name, start_datetime: time }).eq('id', id);
        else await sbClient.from('bookings').insert({ customer_name: name, start_datetime: time });
        clearForm(); fetchBookings(); renderTimeSlots();
    }

    function editBooking(id, name, datetime) {
        document.getElementById('edit_id').value = id;
        document.getElementById('customer_name').value = name;
        document.getElementById('select_date').value = datetime.substring(0, 10);
        document.getElementById('selected_datetime').value = datetime;
        document.getElementById('save_btn').innerText = '変更を保存';
        renderTimeSlots();
    }

    async function deleteBooking(id) { await sbClient.from('bookings').delete().eq('id', id); fetchBookings(); renderTimeSlots(); }
    function clearForm() { 
        document.getElementById('edit_id').value = ''; 
        document.getElementById('customer_name').value = ''; 
        document.getElementById('save_btn').innerText = '予約を登録';
        document.querySelectorAll('#time-slots button').forEach(b => b.classList.remove('selected-slot'));
    }

    fetchBookings();
</script>
</body>
</html>
