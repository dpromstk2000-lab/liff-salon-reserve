<script>
    async function renderTimeSlots() {
        const dateStr = document.getElementById('select_date').value;
        const container = document.getElementById('time-slots');
        if (!dateStr) return;

        // 設定の読み込み
        const { data: set } = await sbClient.from('salon_settings').select('*').eq('id', 1).single();
        
        // 定休日判定のガード
        if (set && set.regular_holidays) {
            const dayOfWeek = new Date(dateStr).getDay();
            const holidays = set.regular_holidays.split(',').map(d => d.trim());
            if (holidays.includes(dayOfWeek.toString())) {
                container.innerHTML = '<p style="color:red; text-align:center;">本日は定休日です。</p>';
                return;
            }
        }

        // 予約状況の取得
        const { data: bookings } = await sbClient.from('bookings').select('start_datetime').gte('start_datetime', `${dateStr}T00:00:00`).lte('start_datetime', `${dateStr}T23:59:59`);
        const booked = bookings ? bookings.map(b => b.start_datetime.substring(11, 16)) : [];

        // 枠の表示
        container.innerHTML = '';
        const startH = set?.open_time ? parseInt(set.open_time.split(':')[0]) : 10;
        const endH = set?.close_time ? parseInt(set.close_time.split(':')[0]) : 19;

        for (let h = startH; h < endH; h++) {
            [0, 30].forEach(m => {
                const t = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                const isBooked = booked.includes(t);
                const btn = document.createElement('button');
                btn.innerText = isBooked ? '✕' : t;
                btn.disabled = isBooked;
                if (isBooked) btn.style.background = '#eee';
                btn.onclick = () => {
                    document.querySelectorAll('#time-slots button').forEach(b => b.classList.remove('selected-slot'));
                    btn.classList.add('selected-slot');
                    document.getElementById('selected_datetime').value = `${dateStr}T${t}:00`;
                };
                container.appendChild(btn);
            });
        }
    }
    // 5秒ごとに自動更新
    setInterval(renderTimeSlots, 5000);
</script>
