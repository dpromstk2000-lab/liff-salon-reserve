<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>オーナー専用管理画面</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .booking-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 5px; }
    </style>
</head>
<body>
    <div id="admin-view">
        <h2 id="display-date"></h2>
        <div id="booking-list"></div>
    </div>

<script>
    const sbClient = supabase.createClient('https://cbknucemarcpbscirzyv.supabase.co', 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J');

    async function fetchBookings() {
        const { data } = await sbClient.from('bookings').select('*').order('start_datetime');
        const list = document.getElementById('booking-list');
        list.innerHTML = '';
        data?.forEach(b => {
            const div = document.createElement('div');
            div.className = 'booking-item';
            div.innerHTML = `
                <span>${b.start_datetime.substring(11, 16)} - ${b.customer_name}</span>
                <input type="text" value="${b.memo || ''}" placeholder="メモを入力" onchange="updateMemo(${b.id}, this.value)">
            `;
            list.append(div);
        });
    }

    async function updateMemo(id, memoText) {
        await sbClient.from('bookings').update({ memo: memoText }).eq('id', id);
    }

    fetchBookings();
</script>
</body>
</html>
