<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>オーナー専用：店舗設定・予約管理</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fcfbf9; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .section { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        input, select { width: 100%; padding: 8px; margin: 5px 0 15px; box-sizing: border-box; }
        button { cursor: pointer; padding: 10px; border-radius: 4px; border: none; color: white; width: 100%; margin-top: 5px; }
        .booking-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div id="login-view">
        <h3>管理者ログイン</h3>
        <input type="email" id="email" placeholder="メール">
        <input type="password" id="password" placeholder="パスワード">
        <button onclick="login()" style="background:#8e7f7f;">ログイン</button>
    </div>

    <div id="admin-view" style="display:none;">
        <div class="section">
            <h3>店舗設定</h3>
            <label>営業開始時間</label>
            <input type="time" id="open-time">
            <label>営業終了時間</label>
            <input type="time" id="close-time">
            <label>定休日 (0:日, 1:月...6:土)</label>
            <input type="number" id="regular-holiday" placeholder="例: 1">
            <button onclick="saveSettings()" style="background:#5cb85c;">設定を保存</button>
        </div>
        
        <div class="section">
            <h3>予約管理</h3>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="changeDate(-1)" style="width:auto; background:#888;">←</button>
                <h4 id="display-date"></h4>
                <button onclick="changeDate(1)" style="width:auto; background:#888;">→</button>
            </div>
            <div id="booking-list"></div>
        </div>
    </div>
</div>

<script>
    const sbClient = supabase.createClient('https://cbknucemarcpbscirzyv.supabase.co', 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J');
    let currentDate = new Date();

    async function login() {
        const { error } = await sbClient.auth.signInWithPassword({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        });
        if (error) return alert('ログイン失敗');
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('admin-view').style.display = 'block';
        loadSettings();
        fetchBookings();
    }

    async function loadSettings() {
        const { data } = await sbClient.from('salon_settings').select('*').eq('id', 1).single();
        if (data) {
            document.getElementById('open-time').value = data.open_time;
            document.getElementById('close-time').value = data.close_time;
            document.getElementById('regular-holiday').value = data.regular_holidays;
        }
    }

    async function saveSettings() {
        await sbClient.from('salon_settings').update({
            open_time: document.getElementById('open-time').value,
            close_time: document.getElementById('close-time').value,
            regular_holidays: document.getElementById('regular-holiday').value
        }).eq('id', 1);
        alert('設定を保存しました');
    }

    function changeDate(d) {
        currentDate.setDate(currentDate.getDate() + d);
        fetchBookings();
    }

    async function fetchBookings() {
        const dateStr = currentDate.toISOString().split('T')[0];
        document.getElementById('display-date').innerText = dateStr;
        const { data } = await sbClient.from('bookings').select('*')
            .gte('start_datetime', `${dateStr}T00:00:00`)
            .lte('start_datetime', `${dateStr}T23:59:59`)
            .order('start_datetime');
        
        let html = '';
        data?.forEach(b => {
            html += `<div class="booking-item">
                <span>${b.start_datetime.substring(11, 16)} - ${b.customer_name}</span>
                <button onclick="deleteBooking(${b.id})" style="background:#d9534f;">削除</button>
            </div>`;
        });
        document.getElementById('booking-list').innerHTML = html || '<p>予約はありません</p>';
    }

    async function deleteBooking(id) {
        if(confirm('削除しますか？')) {
            await sbClient.from('bookings').delete().eq('id', id);
            fetchBookings();
        }
    }
</script>
</body>
</html>
