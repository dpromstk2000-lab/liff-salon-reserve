<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>予約管理システム（空き枠表示）</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fcfbf9; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .date-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .time-slot { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .reserved { color: #d9534f; font-weight: bold; }
        .free { color: #888; }
    </style>
</head>
<body>
<div class="container">
    <div id="login-view">
        <h3>管理者ログイン</h3>
        <input type="email" id="email" placeholder="メール" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="password" id="password" placeholder="パスワード" style="width:100%; padding:10px; margin-bottom:10px;">
        <button onclick="login()" style="width:100%; padding:10px; background:#8e7f7f; color:white; border:none; border-radius:8px;">ログイン</button>
    </div>

    <div id="admin-view" style="display:none;">
        <div class="date-nav">
            <button onclick="changeDate(-1)">← 前日</button>
            <h2 id="display-date"></h2>
            <button onclick="changeDate(1)">翌日 →</button>
        </div>
        <div id="booking-list"></div>
    </div>
</div>

<script>
    const sbClient = supabase.createClient('https://cbknucemarcpbscirzyv.supabase.co', 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J');
    let currentDate = new Date();
    const workingHours = ["10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00"];

    async function login() {
        const { error } = await sbClient.auth.signInWithPassword({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        });
        if (error) return alert('失敗: ' + error.message);
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('admin-view').style.display = 'block';
        fetchBookings();
    }

    async function changeDate(d) {
        currentDate.setDate(currentDate.getDate() + d);
        fetchBookings();
    }

    async function fetchBookings() {
        const dateStr = currentDate.toISOString().split('T')[0];
        document.getElementById('display-date').innerText = dateStr;
        
        const { data } = await sbClient.from('bookings').select('*').gte('start_datetime', `${dateStr}T00:00:00`).lte('start_datetime', `${dateStr}T23:59:59`);

        const list = document.getElementById('booking-list');
        list.innerHTML = workingHours.map(time => {
            const reserved = data.find(b => b.start_datetime.substring(11, 16) === time);
            return `<div class="time-slot">
                <span>${time}</span>
                <span class="${reserved ? 'reserved' : 'free'}">${reserved ? reserved.customer_name : '---'}</span>
            </div>`;
        }).join('');
    }
</script>
</body>
</html>
