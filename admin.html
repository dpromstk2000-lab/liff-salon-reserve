<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>オーナー専用：管理画面</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #fcfbf9; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .section { margin-bottom: 20px; padding: 10px; border: 1px solid #eee; border-radius: 8px; }
        h3 { margin-top: 0; font-size: 1.1em; color: #555; }
        .input-row { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; font-size: 0.9em; }
        input { width: 80px; padding: 5px; }
        button { cursor: pointer; padding: 8px; border-radius: 4px; border: none; color: white; width: 100%; }
        #booking-list { max-height: 300px; overflow-y: auto; }
        .booking-item { padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9em; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
<div class="container">
    <div id="login-view">
        <h3>管理者ログイン</h3>
        <input type="email" id="email" placeholder="メール" style="width:100%;">
        <input type="password" id="password" placeholder="パスワード" style="width:100%; margin-top:5px;">
        <button onclick="login()" style="background:#8e7f7f; margin-top:10px;">ログイン</button>
    </div>

    <div id="admin-view" style="display:none;">
        <div class="section">
            <h3>⚙️ 店舗設定</h3>
            <div class="input-row">
                営業: <input type="time" id="open-time"> 〜 <input type="time" id="close-time">
            </div>
            <div class="input-row">
                定休日(0:日-6:土): <input type="number" id="regular-holiday" style="width:40px;">
            </div>
            <button onclick="saveSettings()" style="background:#5cb85c;">設定を保存</button>
        </div>
        
        <div class="section">
            <h3>📅 予約管理</h3>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <button onclick="changeDate(-1)" style="width:40px; background:#888;">←</button>
                <span id="display-date" style="font-weight:bold;"></span>
                <button onclick="changeDate(1)" style="width:40px; background:#888;">→</button>
            </div>
            <div id="booking-list"></div>
        </div>
    </div>
</div>

<script>
    const sbClient = supabase.createClient('https://cbknucemarcpbscirzyv.supabase.co', 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J');
    let currentDate = new Date();

    async function login() {
        const { error } = await sbClient.auth.signInWithPassword({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        });
        if (error) return alert('ログイン失敗');
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('admin-view').style.display = 'block';
        loadSettings();
        fetchBookings();
    }

    async function loadSettings() {
        const { data } = await sbClient.from('salon_settings').select('*').eq('id', 1).single();
        if (data) {
            document.getElementById('open-time').value = data.open_time;
            document.getElementById('close-time').value = data.close_time;
            document.getElementById('regular-holiday').value = data.regular_holidays;
        }
    }

    async function saveSettings() {
        await sbClient.from('salon_settings').update({
            open_time: document.getElementById('open-time').value,
            close_time: document.getElementById('close-time').value,
            regular_holidays: document.getElementById('regular-holiday').value
        }).eq('id', 1);
        alert('設定を保存しました');
    }

    function changeDate(d) {
        currentDate.setDate(currentDate.getDate() + d);
        fetchBookings();
    }

    async function fetchBookings() {
        const dateStr = currentDate.toISOString().split('T')[0];
        document.getElementById('display-date').innerText = dateStr;
        const { data } = await sbClient.from('bookings').select('*')
            .gte('start_datetime', `${dateStr}T00:00:00`)
            .lte('start_datetime', `${dateStr}T23:59:59`)
            .order('start_datetime');
        
        let html = '';
        data?.forEach(b => {
            html += `<div class="booking-item">
                <span>${b.start_datetime.substring(11, 16)}：${b.customer_name}</span>
                <button onclick="deleteBooking(${b.id})" style="background:#d9534f; width:50px; font-size:0.8em;">削除</button>
            </div>`;
        });
        document.getElementById('booking-list').innerHTML = html || '<p style="font-size:0.9em; color:#888;">予約なし</p>';
    }

    async function deleteBooking(id) {
        if(confirm('削除しますか？')) {
            await sbClient.from('bookings').delete().eq('id', id);
            fetchBookings();
        }
    }
</script>
</body>
</html>
