<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>オーナー管理画面</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fcfbf9; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .booking-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        input { padding: 8px; margin-bottom: 5px; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; padding: 8px 12px; border-radius: 4px; border: none; color: white; background: #888; }
    </style>
</head>
<body>
<div class="container">
    <div id="login-view">
        <h3>管理者ログイン</h3>
        <input type="email" id="email" placeholder="メール">
        <input type="password" id="password" placeholder="パスワード">
        <button onclick="login()" style="width:100%; background:#8e7f7f;">ログイン</button>
    </div>
    <div id="admin-view" style="display:none;">
        <h4>⚙️ 電話予約追加（表示中の日付に予約）</h4>
        <input type="text" id="manual-name" placeholder="お客様名">
        <input type="text" id="manual-memo" placeholder="メモ">
        <input type="time" id="manual-time"> <button onclick="addManualBooking()" style="background:#428bca; width:100%;">この日付で予約追加</button>
        
        <div style="display:flex; justify-content:space-between; margin-top:20px;">
            <button onclick="changeDate(-1)">← 前日</button>
            <h3 id="display-date"></h3>
            <button onclick="changeDate(1)">翌日 →</button>
        </div>
        <div id="booking-list"></div>
    </div>
</div>

<script>
    const sbClient = supabase.createClient('https://cbknucemarcpbscirzyv.supabase.co', 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J');
    let currentDate = new Date();

    async function login() {
        const { error } = await sbClient.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('password').value });
        if (error) return alert('ログイン失敗');
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('admin-view').style.display = 'block';
        fetchBookings();
    }

    async function addManualBooking() {
        const name = document.getElementById('manual-name').value;
        const memo = document.getElementById('manual-memo').value;
        const time = document.getElementById('manual-time').value;
        const dateStr = currentDate.toISOString().split('T')[0];
        if (!name || !time) return alert('名前と時間を選択');
        
        // 日付(表示中のもの)と時間(選択したもの)を結合
        await sbClient.from('bookings').insert({ customer_name: name, memo: memo, start_datetime: `${dateStr}T${time}:00` });
        alert('予約を追加しました'); fetchBookings();
    }

    function changeDate(d) { currentDate.setDate(currentDate.getDate() + d); fetchBookings(); }

    async function fetchBookings() {
        const dateStr = currentDate.toISOString().split('T')[0];
        document.getElementById('display-date').innerText = dateStr;
        
        const { data: bookings } = await sbClient.from('bookings').select('*').gte('start_datetime', `${dateStr}T00:00:00`).lte('start_datetime', `${dateStr}T23:59:59`).order('start_datetime');
        
        let html = '';
        // 10時〜19時まで表示
        for(let h=10; h<19; h++) {
            [0, 30].forEach(m => {
                const timeStr = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                const b = bookings?.find(item => item.start_datetime.substring(11, 16) === timeStr);
                const memoText = b?.memo ? ` <span style="color:#666; font-size:0.8em;">(メモ: ${b.memo})</span>` : '';
                html += `<div class="booking-item"><span>${timeStr} ${b ? ' - ' + b.customer_name + memoText : '〇 空き'}</span>
                    ${b ? `<button onclick="deleteBooking(${b.id})" style="background:#d9534f;">削除</button>` : ''}</div>`;
            });
        }
        document.getElementById('booking-list').innerHTML = html;
    }

    async function deleteBooking(id) { if(confirm('削除しますか？')) { await sbClient.from('bookings').delete().eq('id', id); fetchBookings(); } }
</script>
</body>
</html>
