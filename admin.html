    // 臨時休業の状態を保持する辞書
    let holidays = {};

    function toggleHoliday() {
        const dateStr = currentDate.toISOString().split('T')[0];
        holidays[dateStr] = !holidays[dateStr];
        fetchBookings();
    }

    async function fetchBookings() {
        const dateStr = currentDate.toISOString().split('T')[0];
        document.getElementById('display-date').innerText = dateStr;

        // 月曜定休 or 臨時休業の判定
        const isMonday = currentDate.getDay() === 1;
        const isHoliday = holidays[dateStr];

        const btn = document.getElementById('holiday-btn');
        btn.innerText = isHoliday ? "営業を再開する" : "この日を臨時休業にする";
        btn.style.background = isHoliday ? "#5cb85c" : "#d9534f";
        btn.style.color = "white";

        if (isMonday || isHoliday) {
            document.getElementById('booking-input-area').style.display = 'none';
            document.getElementById('booking-list').innerHTML = `<h4 style="text-align:center; padding:20px;">${isMonday ? '本日は定休日です' : '本日は臨時休業です'}</h4>`;
            return;
        }

        document.getElementById('booking-input-area').style.display = 'block';
