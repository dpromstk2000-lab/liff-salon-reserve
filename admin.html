<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>オーナー管理画面</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fcfbf9; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .settings-box { background: #fdfdfd; padding: 15px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 20px; }
        .booking-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .time-label { font-weight: bold; width: 60px; }
        input { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; padding: 8px 12px; border-radius: 4px; border: none; color: white; background: #8e7f7f; }
    </style>
</head>
<body>
<div class="container">
    <div id="login-view">
        <h3>管理者ログイン</h3>
        <input type="email" id="email" placeholder="メール">
        <input type="password" id="password" placeholder="パスワード">
        <button onclick="login()" style="width:100%;">ログイン</button>
    </div>
    
    <div id="admin-view" style="display:none;">
        <div class="settings-box">
            <h4>⚙️ 店舗設定</h4>
            <input type="time" id="open-time"> 〜 <input type="time" id="close-time">
            <input type="text" id="regular-holiday" placeholder="定休日(0:日-6:土, カンマ区切り)">
            <button onclick="saveSettings()" style="background:#5cb85c; width:100%;">設定を保存</button>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <button onclick="changeDate(-1)">← 前日</button>
            <h3 id="display-date"></h3>
            <button onclick="changeDate(1)">翌日 →</button>
        </div>
        <div id="booking-list"></div>
    </div>
</div>

<script>
    const sbClient = supabase.createClient('https://cbknucemarcpbscirzyv.supabase.co', 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J');
    let currentDate = new Date();

    async function login() {
        const { error } = await sbClient.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('password').value });
        if (error) return alert('ログイン失敗');
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('admin-view').style.display = 'block';
        loadSettings(); fetchBookings();
    }

    async function loadSettings() {
        const { data } = await sbClient.from('salon_settings').select('*').eq('id', 1).single();
        if (data) {
            document.getElementById('open-time').value = data.open_time;
            document.getElementById('close-time').value = data.close_time;
            document.getElementById('regular-holiday').value = data.regular_holidays;
        }
    }

    async function saveSettings() {
        await sbClient.from('salon_settings').update({
            open_time: document.getElementById('open-time').value,
            close_time: document.getElementById('close-time').value,
            regular_holidays: document.getElementById('regular-holiday').value
        }).eq('id', 1);
        alert('保存しました');
    }

    // 枠をクリックした時に呼び出される予約登録
    async function addBooking(time) {
        const name = prompt("お客様名を入力してください");
        if (!name) return;
        const memo = prompt("メモを入力（任意）");
        const dateStr = currentDate.toISOString().split('T')[0];
        
        await sbClient.from('bookings').insert({ 
            customer_name: name, 
            memo: memo, 
            start_datetime: `${dateStr}T${time}:00` 
        });
        fetchBookings();
    }

    function changeDate(d) { currentDate.setDate(currentDate.getDate() + d); fetchBookings(); }

    async function fetchBookings() {
        const dateStr = currentDate.toISOString().split('T')[0];
        document.getElementById('display-date').innerText = dateStr;
        
        const { data: set } = await sbClient.from('salon_settings').select('*').eq('id', 1).single();
        const { data: bookings } = await sbClient.from('bookings').select('*').gte('start_datetime', `${dateStr}T00:00:00`).lte('start_datetime', `${dateStr}T23:59:59`).order('start_datetime');
        
        let html = '';
        const startH = parseInt(set.open_time.split(':')[0]);
        const endH = parseInt(set.close_time.split(':')[0]);

        for(let h=startH; h<endH; h++) {
            [0, 30].forEach(m => {
                const timeStr = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                const b = bookings?.find(item => item.start_datetime.substring(11, 16) === timeStr);
                
                if (b) {
                    html += `<div class="booking-item"><span class="time-label">${timeStr}</span> 
                            <span>${b.customer_name} ${b.memo ? '('+b.memo+')' : ''}</span>
                            <button onclick="deleteBooking(${b.id})" style="background:#d9534f;">削除</button></div>`;
                } else {
                    html += `<div class="booking-item"><span class="time-label">${timeStr}</span> 
                            <span style="color:#aaa;">〇 空き</span>
                            <button onclick="addBooking('${timeStr}')" style="background:#5cb85c;">予約を入れる</button></div>`;
                }
            });
        }
        document.getElementById('booking-list').innerHTML = html;
    }

    async function deleteBooking(id) { if(confirm('削除しますか？')) { await sbClient.from('bookings').delete().eq('id', id); fetchBookings(); } }
</script>
</body>
</html>
