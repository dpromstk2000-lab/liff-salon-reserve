<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>オーナー管理画面（ログイン省略版）</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fcfbf9; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .settings-box { background: #fdfdfd; padding: 15px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 20px; }
        .booking-row { padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        .time-label { font-weight: bold; width: 60px; flex-shrink: 0; }
        input { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; padding: 6px 10px; border-radius: 4px; border: none; color: white; background: #8e7f7f; }
        button:disabled { background: #ccc !important; cursor: not-allowed; }
        .staff-tag { background:#e1f5fe; padding:4px 8px; border-radius:15px; border:1px solid #b3e5fc; display:flex; align-items:center; gap:5px; font-size:13px; margin-right:5px; }
    </style>
</head>
<body>
<div class="container">
    <div id="admin-view">
        <h3>⚙️ 店舗設定・予約管理</h3>
        <div class="settings-box">
            <h4>店舗設定</h4>
            <input type="time" id="open-time"> 〜 <input type="time" id="close-time">
            <input type="text" id="regular-holiday" placeholder="定休日(0:日-6:土, カンマ区切り)">
            <button onclick="saveSettings()" style="background:#5cb85c; width:100%;">設定を保存</button>
        </div>

        <div class="settings-box">
            <h4>スタッフ管理</h4>
            <div id="staff-list-grid" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px;"></div>
            <input type="text" id="new-staff-name" placeholder="新しいスタッフ名">
            <button onclick="addStaff()" style="background:#5cb85c; width:100%;">スタッフを追加</button>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <button onclick="changeDate(-1)">← 前日</button>
            <h3 id="display-date"></h3>
            <button onclick="changeDate(1)">翌日 →</button>
        </div>
        <div id="booking-list"></div>
    </div>
</div>

<script>
    const sbClient = supabase.createClient('https://cbknucemarcpbscirzyv.supabase.co', 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J');
    let currentDate = new Date();

    // ページ読み込み時に自動実行
    window.onload = () => {
        loadSettings();
        fetchStaffs();
        fetchBookings();
    };

    async function loadSettings() {
        const { data } = await sbClient.from('salon_settings').select('*').eq('id', 1).single();
        if (data) {
            document.getElementById('open-time').value = data.open_time;
            document.getElementById('close-time').value = data.close_time;
            document.getElementById('regular-holiday').value = data.regular_holidays;
        }
    }

    async function saveSettings() {
        await sbClient.from('salon_settings').update({
            open_time: document.getElementById('open-time').value,
            close_time: document.getElementById('close-time').value,
            regular_holidays: document.getElementById('regular-holiday').value
        }).eq('id', 1);
        alert('設定を保存しました');
    }

    async function fetchStaffs() {
        const { data } = await sbClient.from('staffs').select('*');
        window.currentStaffs = data || [];
        document.getElementById('staff-list-grid').innerHTML = window.currentStaffs.map(s => `
            <div class="staff-tag">${s.name}<button onclick="deleteStaff(${s.id})" style="background:none; color:#ff5252; padding:0;">✕</button></div>`).join('');
    }

    async function addStaff() {
        const name = document.getElementById('new-staff-name').value;
        if (!name) return;
        await sbClient.from('staffs').insert({ name: name });
        document.getElementById('new-staff-name').value = '';
        fetchStaffs();
    }

    async function deleteStaff(id) { if(confirm('スタッフを削除しますか？')) { await sbClient.from('staffs').delete().eq('id', id); fetchStaffs(); } }

    async function addBooking(time) {
        const name = prompt("お客様名");
        if (!name) return;
        const memo = prompt("メモ");
        const staffOptions = window.currentStaffs.map((s, index) => `${index + 1}: ${s.name}`).join('\n');
        const staffIndex = prompt("担当スタッフ番号:\n0: 指定なし(お任せ)\n" + staffOptions);
        
        let selectedStaff = "お任せ";
        if (staffIndex !== null && staffIndex !== "0" && window.currentStaffs[parseInt(staffIndex) - 1]) {
            selectedStaff = window.currentStaffs[parseInt(staffIndex) - 1].name;
        }
        
        const dateStr = currentDate.toISOString().split('T')[0];
        await sbClient.from('bookings').insert({ 
            customer_name: name, memo: memo, staff_name: selectedStaff, start_datetime: `${dateStr}T${time}:00` 
        });
        fetchBookings();
    }

    function changeDate(d) { currentDate.setDate(currentDate.getDate() + d); fetchBookings(); }

    async function fetchBookings() {
        const dateStr = currentDate.toISOString().split('T')[0];
        document.getElementById('display-date').innerText = dateStr;
        const { data: set } = await sbClient.from('salon_settings').select('*').eq('id', 1).single();
        const { data: bookings } = await sbClient.from('bookings').select('*').gte('start_datetime', `${dateStr}T00:00:00`).lte('start_datetime', `${dateStr}T23:59:59`).order('start_datetime');
        const { data: staffs } = await sbClient.from('staffs').select('*');
        
        const staffCount = staffs ? staffs.length : 0;
        let html = '';
        const startH = parseInt(set.open_time.split(':')[0]);
        const endH = parseInt(set.close_time.split(':')[0]);

        for(let h=startH; h<endH; h++) {
            [0, 30].forEach(m => {
                const t = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                const timeBookings = bookings?.filter(b => b.start_datetime.substring(11, 16) === t);
                const bookedCount = timeBookings ? timeBookings.length : 0;
                
                html += `<div class="booking-row"><span class="time-label">${t}</span><div style="flex-grow:1;">`;
                if (bookedCount > 0) {
                    timeBookings.forEach(b => {
                        html += `<div>${b.customer_name} [${b.staff_name}] <button onclick="deleteBooking(${b.id})" style="background:#d9534f; font-size:10px;">削除</button></div>`;
                    });
                } else { html += `<span style="color:#ccc;">〇 空き</span>`; }
                
                html += `</div>`;
                if (bookedCount >= staffCount && staffCount > 0) {
                    html += `<button disabled>満席</button></div>`;
                } else {
                    html += `<button onclick="addBooking('${t}')" style="background:#5cb85c;">＋</button></div>`;
                }
            });
        }
        document.getElementById('booking-list').innerHTML = html;
    }

    async function deleteBooking(id) { if(confirm('削除しますか？')) { await sbClient.from('bookings').delete().eq('id', id); fetchBookings(); } }
</script>
</body>
</html>
